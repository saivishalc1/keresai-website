# ═════════════════════════════════════════════════
#  Netlify configuration — Keres AI website
#  Static site, no build step
#  Enhanced security & performance
# ═════════════════════════════════════════════════

[build]
  publish = "."
  # No build command — site is pre-built static files
  command = ""

# ─── Security headers (applied to every response) ───
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking attacks
    X-Frame-Options          = "DENY"
    # Prevent MIME-type sniffing
    X-Content-Type-Options   = "nosniff"
    # Control referrer information
    Referrer-Policy          = "strict-origin-when-cross-origin"
    # Disable unnecessary APIs for privacy/security
    Permissions-Policy       = "camera=(), microphone=(), geolocation=(), interest-cohort=(), payment=()"
    # Force HTTPS (strict 1-year maximum age + subdomains + preload)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Legacy XSS protection (modern browsers use CSP)
    X-XSS-Protection         = "0"
    # Additional privacy header
    X-Permitted-Cross-Domain-Policies = "none"
    # Prevent DNS prefetch from leaking requests
    X-DNS-Prefetch-Control   = "off"
    # Content Security Policy (comprehensive)
    Content-Security-Policy  = "default-src 'none'; script-src 'self'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://formspree.io https://calendly.com; frame-src https://calendly.com; form-action 'self' https://formspree.io; base-uri 'self'; frame-ancestors 'none'; manifest-src 'self'; worker-src 'self';"

# ─── Long cache for static assets ───
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/img/KeresLogo.png"
  [headers.values]
    Cache-Control = "public, max-age=604800, immutable"

# ─── HTML should revalidate ───
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate, no-cache"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate, no-cache"

# ─── Security for API/form endpoints ───
[[headers]]
  for = "/index.html"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"

[[headers]]
  for = "/resources.html"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"

# ─── HTTPS redirect ───
[[redirects]]
  from   = "http://*"
  to     = "https://:splat"
  status = 301
  force  = true

# ─── Friendly redirects ───
[[redirects]]
  from   = "/home"
  to     = "/"
  status = 301

[[redirects]]
  from   = "/index"
  to     = "/"
  status = 301

# ─── Add www redirect to non-www ───
[[redirects]]
  from   = "https://www.keresai.com/*"
  to     = "https://keresai.com/:splat"
  status = 301
  force  = true

# ─── Fallback for missing pages ───
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
